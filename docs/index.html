<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>잠실맛집 | Fraunhofer 근처 맛집·카페</title>
  <meta name="description" content="프라운호퍼 한국사무소(잠실) 근처 도보 15분 맛집·카페 추천" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="brand">
          <span class="brand-badge">Fraunhofer Korea · Jamsil</span>
          <h1>잠실맛집</h1>
          <p class="subtitle">프라운호퍼 한국사무소 근처 · 도보 15분 이내 맛집·카페</p>
        </div>
        <div class="header-actions">
          <button type="button" id="btn-refresh" class="btn btn-outline" title="데이터 새로고침">
            <span class="icon">↻</span> 새로고침
          </button>
        </div>
      </div>

      <section class="filters" aria-label="필터">
        <div class="filter-group">
          <label for="filter-rating">최소 평점 <output id="rating-value">4.0</output> <span class="filter-hint">(미정 시 통과)</span></label>
          <input type="range" id="filter-rating" min="0" max="5" step="0.5" value="4" />
        </div>
        <div class="filter-group">
          <label for="filter-price">최대 가격 <output id="price-value">15,000</output>원</label>
          <input type="range" id="filter-price" min="5000" max="50000" step="1000" value="15000" />
        </div>
        <div class="filter-group">
          <label for="filter-walk">최대 도보 <output id="walk-value">15</output>분</label>
          <input type="range" id="filter-walk" min="5" max="20" step="1" value="15" />
        </div>
        <div class="filter-group filter-type">
          <span class="filter-label">유형</span>
          <div class="chip-group" role="group" aria-label="장소 유형">
            <button type="button" class="chip active" data-type="all">전체</button>
            <button type="button" class="chip" data-type="restaurant">맛집</button>
            <button type="button" class="chip" data-type="cafe">카페</button>
          </div>
        </div>
      </section>

      <nav class="tabs" role="tablist">
        <button type="button" class="tab active" role="tab" aria-selected="true" data-view="map">
          <span class="tab-icon">♥</span> 지도
        </button>
        <button type="button" class="tab" role="tab" aria-selected="false" data-view="list">
          <span class="tab-icon">☰</span> 분류별 목록
        </button>
      </nav>
    </header>

    <main class="main">
      <section id="view-map" class="view view-map active" role="tabpanel">
        <div id="map" class="map-container" aria-label="맛집 지도"></div>
        <div id="map-popup" class="map-popup hidden" role="dialog" aria-modal="true">
          <button type="button" class="popup-close" aria-label="닫기">×</button>
          <div id="map-popup-body"></div>
        </div>
      </section>

      <section id="view-list" class="view view-list" role="tabpanel">
        <div id="category-list" class="category-list"></div>
        <p id="list-empty" class="empty-state hidden">조건에 맞는 장소가 없습니다. 필터를 조정해 보세요.</p>
      </section>
    </main>

    <footer class="footer">
      <span id="result-count">불러오는 중…</span>
      <span class="footer-sep">·</span>
      <span>데이터: Kakao Local API</span>
    </footer>
  </div>

  <aside id="new-opening-panel" class="new-opening-panel hidden" aria-label="최근 한 달 신규 오픈 맛집·카페">
    <header class="new-opening-panel-header">
      <div>
        <p class="new-opening-panel-eyebrow">최근 30일</p>
        <h2 class="new-opening-panel-title">신규 오픈 <span id="new-opening-count"></span></h2>
      </div>
      <button type="button" id="new-opening-panel-toggle" class="panel-toggle" aria-label="패널 접기" title="접기">›</button>
    </header>
    <div id="new-opening-panel-body" class="new-opening-panel-body"></div>
  </aside>

  <button type="button" id="new-opening-panel-tab" class="new-opening-panel-tab hidden" aria-label="신규 오픈 패널 열기" title="신규 오픈">
    <span class="tab-icon">✨</span>
    <span class="tab-label">신규</span>
  </button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
