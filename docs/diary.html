<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>식사 기록 | 잠실맛집</title>
  <meta name="description" content="매일 간 식당과 별점을 캘린더에 기록하세요" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260710a" />
</head>
<body class="diary-page">
  <div class="app diary-app">
    <header class="header diary-header">
      <div class="header-top">
        <div class="brand">
          <span class="brand-badge">Fraunhofer Korea · Jamsil</span>
          <h1>식사 기록</h1>
          <p class="subtitle">달력에서 날짜를 선택해 식당과 별점을 남겨 보세요</p>
        </div>
        <div class="header-actions">
          <a href="index.html" class="btn btn-outline diary-nav-link">
            <span class="icon">♥</span> 맛집 지도
          </a>
        </div>
      </div>
    </header>

    <main class="diary-main">
      <div class="diary-toolbar">
        <button type="button" id="diary-prev-month" class="btn btn-outline diary-nav-btn" aria-label="이전 달">‹</button>
        <h2 id="diary-month-label" class="diary-month-label">불러오는 중…</h2>
        <button type="button" id="diary-next-month" class="btn btn-outline diary-nav-btn" aria-label="다음 달">›</button>
        <button type="button" id="diary-today" class="btn btn-outline diary-today-btn">오늘</button>
      </div>

      <div class="diary-calendar" role="grid" aria-labelledby="diary-month-label">
        <div class="diary-weekdays" aria-hidden="true">
          <span class="diary-weekday diary-weekday--sun">일</span>
          <span class="diary-weekday">월</span>
          <span class="diary-weekday">화</span>
          <span class="diary-weekday">수</span>
          <span class="diary-weekday">목</span>
          <span class="diary-weekday">금</span>
          <span class="diary-weekday diary-weekday--sat">토</span>
        </div>
        <div id="diary-grid" class="diary-grid" aria-live="polite"></div>
      </div>

      <p class="diary-hint">날짜를 누르면 기록 페이지로 이동합니다. 기록은 사이트에 저장되어 다른 기기에서도 볼 수 있어요.</p>

      <section id="diary-sync-settings" class="diary-sync-settings">
        <button type="button" class="btn btn-outline diary-sync-toggle" data-diary-sync-open>동기화 설정</button>
        <div class="diary-sync-panel" data-diary-sync-panel hidden>
          <p class="diary-sync-lead">GitHub Pages에서는 쓰기용 fine-grained PAT이 한 번 필요해요. (Contents 읽기/쓰기 · 이 저장소만)</p>
          <label class="diary-field">
            <span>GitHub 토큰</span>
            <input type="password" data-diary-sync-token placeholder="github_pat_…" autocomplete="off" />
          </label>
          <p class="diary-field-hint" data-diary-sync-hint></p>
          <div class="diary-sync-actions">
            <button type="button" class="btn btn-new" data-diary-sync-save>저장 후 동기화</button>
            <button type="button" class="btn btn-outline" data-diary-sync-clear>토큰 삭제</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span id="diary-stats">기록 0건</span>
      <span class="footer-sep">·</span>
      <span id="diary-sync-status">불러오는 중…</span>
    </footer>
  </div>

  <script src="js/diary-shared.js?v=20260710a"></script>
  <script src="js/diary.js?v=20260710a"></script>
</body>
</html>
