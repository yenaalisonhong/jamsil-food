<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>식사 기록 | 잠실맛집</title>
  <meta name="description" content="선택한 날짜의 식당과 별점을 기록하세요" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260710a" />
</head>
<body class="diary-page diary-day-page">
  <div class="app diary-app">
    <header class="header diary-header">
      <div class="header-top">
        <div class="brand">
          <span class="brand-badge">Fraunhofer Korea · Jamsil</span>
          <p class="diary-modal-eyebrow">식사 기록</p>
          <h1 id="diary-day-title" class="diary-day-title">날짜 불러오는 중…</h1>
        </div>
        <div class="header-actions">
          <a id="diary-back-link" href="diary.html" class="btn btn-outline diary-nav-link">← 캘린더</a>
        </div>
      </div>
    </header>

    <main class="diary-day-main">
      <section class="diary-day-section">
        <h2 class="diary-day-section-title">오늘의 기록</h2>
        <div id="diary-entry-list" class="diary-entry-list diary-entry-list--page"></div>
      </section>

      <section class="diary-day-section">
        <h2 class="diary-day-section-title">새 기록 추가</h2>
        <form id="diary-entry-form" class="diary-entry-form diary-entry-form--page">
          <label class="diary-field">
            <span>식당명</span>
            <input type="text" id="diary-name" name="name" list="diary-place-suggestions" placeholder="식당 이름" required autocomplete="off" />
            <datalist id="diary-place-suggestions"></datalist>
          </label>
          <fieldset class="diary-field diary-rating-field">
            <legend>별점</legend>
            <div class="diary-star-picker" role="radiogroup" aria-label="별점 선택">
              <input type="radio" name="diary-rating" id="diary-star-5" value="5" />
              <label for="diary-star-5" title="5점"><span class="sr-only">5점</span>★</label>
              <input type="radio" name="diary-rating" id="diary-star-4" value="4" checked />
              <label for="diary-star-4" title="4점"><span class="sr-only">4점</span>★</label>
              <input type="radio" name="diary-rating" id="diary-star-3" value="3" />
              <label for="diary-star-3" title="3점"><span class="sr-only">3점</span>★</label>
              <input type="radio" name="diary-rating" id="diary-star-2" value="2" />
              <label for="diary-star-2" title="2점"><span class="sr-only">2점</span>★</label>
              <input type="radio" name="diary-rating" id="diary-star-1" value="1" />
              <label for="diary-star-1" title="1점"><span class="sr-only">1점</span>★</label>
            </div>
            <p id="diary-rating-label" class="diary-rating-label" aria-live="polite">4점 선택됨</p>
          </fieldset>
          <label class="diary-field">
            <span>가격대 <span class="diary-optional">(선택)</span></span>
            <div class="diary-price-inputs">
              <input
                type="number"
                id="diary-price-min"
                name="price_min"
                placeholder="최소"
                min="0"
                step="500"
                inputmode="numeric"
                aria-label="최소 가격 (원)"
              />
              <span class="diary-price-sep" aria-hidden="true">~</span>
              <input
                type="number"
                id="diary-price-max"
                name="price_max"
                placeholder="최대"
                min="0"
                step="500"
                inputmode="numeric"
                aria-label="최대 가격 (원)"
              />
              <span class="diary-price-unit" aria-hidden="true">원</span>
            </div>
            <p class="diary-field-hint">한 가격만 알면 최소·최대에 같은 금액을 입력하세요</p>
          </label>
          <label class="diary-field">
            <span>메모 <span class="diary-optional">(선택)</span></span>
            <textarea id="diary-memo" name="memo" rows="3" placeholder="메뉴, 동행, 한 줄 후기…"></textarea>
          </label>
          <button type="submit" class="btn btn-new diary-submit-btn">기록 추가</button>
        </form>
      </section>

      <section id="diary-sync-settings" class="diary-sync-settings">
        <button type="button" class="btn btn-outline diary-sync-toggle" data-diary-sync-open>동기화 설정</button>
        <div class="diary-sync-panel" data-diary-sync-panel hidden>
          <p class="diary-sync-lead">다른 기기에서도 쓰려면 GitHub fine-grained PAT(Contents 읽기/쓰기 · 이 저장소만)을 입력하세요.</p>
          <label class="diary-field">
            <span>GitHub 토큰</span>
            <input type="password" data-diary-sync-token placeholder="github_pat_…" autocomplete="off" />
          </label>
          <p class="diary-field-hint" data-diary-sync-hint></p>
          <div class="diary-sync-actions">
            <button type="button" class="btn btn-new" data-diary-sync-save>저장 후 동기화</button>
            <button type="button" class="btn btn-outline" data-diary-sync-clear>토큰 삭제</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span id="diary-stats">기록 0건</span>
      <span class="footer-sep">·</span>
      <span id="diary-sync-status">불러오는 중…</span>
    </footer>
  </div>

  <script src="js/diary-shared.js?v=20260710a"></script>
  <script src="js/diary-day.js?v=20260710a"></script>
</body>
</html>
