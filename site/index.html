<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>잠실맛집 | Fraunhofer 한국사무소 근처 맛집·카페</title>
  <meta
    name="description"
    content="프라운호퍼 한국사무소(잠실) 근처 맛집·카페 추천 및 신규 오픈 알림 도구"
  />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e8edf4;
      --muted: #9aa8b8;
      --accent: #00a884;
      --accent-soft: rgba(0, 168, 132, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: radial-gradient(circle at top, #1b2a3d 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem 3rem;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.75rem);
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }

    .lead {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
    }

    ul {
      padding-left: 1.2rem;
      color: var(--muted);
    }

    li + li {
      margin-top: 0.35rem;
    }

    code {
      background: rgba(255, 255, 255, 0.08);
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      font-size: 0.92em;
    }

    footer {
      margin-top: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <span class="badge">Fraunhofer Korea · Jamsil</span>
    <h1>잠실맛집</h1>
    <p class="lead">
      프라운호퍼 한국사무소(잠실더샵스타파크) 근처 맛집·카페를 추천하고,
      신규 오픈 소식을 알려 주는 내부 도구입니다.
    </p>

    <section class="card">
      <h2>주요 기능</h2>
      <ul>
        <li>도보 15분 이내 맛집·카페 추천</li>
        <li>평점·가격·거리 기준 필터</li>
        <li>잠실 신규 오픈 알림</li>
      </ul>
    </section>

    <section class="card">
      <h2>사용 API</h2>
      <ul>
        <li>Kakao Local API — 위치·거리 검색</li>
        <li>Naver Search API — 지역·블로그·뉴스 검색</li>
      </ul>
    </section>

    <footer>
      서비스 환경: 로컬 CLI · <code>http://localhost</code>
    </footer>
  </main>
</body>
</html>
